services:
  db:
    image: postgres:16-alpine
    container_name: todoplan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: todoplan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todoplan_change_me}
      POSTGRES_DB: todoplan
    volumes:
      - todoplan_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todoplan -d todoplan"]
      interval: 5s
      timeout: 5s
      retries: 15
    # 不对外暴露 5432，仅容器内网
    networks:
      - todoplan_net

  app:
    build: .
    container_name: todoplan-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://todoplan:${POSTGRES_PASSWORD:-todoplan_change_me}@db:5432/todoplan
      SEED_ADMIN: "1"
      NODE_ENV: production
    volumes:
      - todoplan_uploads:/data/uploads
    networks:
      - todoplan_net

volumes:
  todoplan_pg:
  todoplan_uploads:

networks:
  todoplan_net:
    driver: bridge
